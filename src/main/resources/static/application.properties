# Server Configuration
server.port=8080
spring.web.resources.static-locations=classpath:/static/

# Database Connection Pooling (HikariCP) - Reduces connection time from ~500ms to ~10ms
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-test-query=SELECT 1

# MySQL Connection with performance optimizations
spring.datasource.url=jdbc:mysql://localhost:3306/stationery_billing?useSSL=false&serverTimezone=UTC&autoReconnect=true
spring.datasource.username=root
spring.datasource.password=kavya@123

# Logging (WARN reduces console output = faster performance)
logging.level.com.smartbilling=WARN
logging.level.org.springframework=WARN