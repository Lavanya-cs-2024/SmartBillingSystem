<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Billing System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .mode-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            transition: all 0.3s;
            cursor: pointer;
            border: 2px solid transparent;
            height: 100%;
        }

        .mode-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            border-color: #667eea;
        }

        .mode-card i {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        .mode-card.customer i {
            color: #28a745;
        }

        .mode-card.admin i {
            color: #dc3545;
        }

        .mode-card h3 {
            font-weight: bold;
            margin-bottom: 15px;
        }

        .mode-card p {
            color: #666;
            margin-bottom: 0;
        }

        .login-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            max-width: 450px;
            width: 100%;
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header i {
            font-size: 3rem;
            color: #667eea;
            margin-bottom: 15px;
        }

        .login-header h2 {
            font-weight: bold;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn-custom {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            padding: 12px;
            font-weight: bold;
            width: 100%;
        }

        .btn-custom:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.9);
            border: none;
            border-radius: 50px;
            padding: 10px 20px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            z-index: 1000;
        }

        .back-btn:hover {
            background: white;
            transform: translateX(-5px);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fade {
            animation: fadeIn 0.5s ease-out;
        }
    </style>
</head>
<body>
    <div id="app" class="container">
        <!-- Content will be loaded here dynamically -->
    </div>

    <script>
        // Store admin credentials (in production, this should be on backend)
        const ADMIN_CREDENTIALS = {
            username: "admin",
            password: "admin123"
        };

        // Page state
        let currentMode = null;

        // Show Mode Selection
        function showModeSelection() {
            currentMode = null;
            document.getElementById('app').innerHTML = `
                <div class="row justify-content-center animate-fade">
                    <div class="col-md-12 text-center mb-5">
                        <h1 style="color: white; font-size: 3rem; font-weight: bold;">
                            <i class="fas fa-store"></i> Smart Billing System
                        </h1>
                        <p style="color: rgba(255,255,255,0.9); font-size: 1.2rem;">Stationery Shop Management</p>
                    </div>
                    <div class="col-md-5 mb-4">
                        <div class="mode-card customer" onclick="selectMode('customer')">
                            <i class="fas fa-user-circle"></i>
                            <h3>Customer Mode</h3>
                            <p>Browse products, add to cart, generate bills and make payments</p>
                            <div class="mt-3">
                                <span class="badge bg-success">Easy Shopping</span>
                                <span class="badge bg-info">Quick Billing</span>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-5 mb-4">
                        <div class="mode-card admin" onclick="selectMode('admin')">
                            <i class="fas fa-user-shield"></i>
                            <h3>Admin Mode</h3>
                            <p>Manage products, view bills, track statistics and inventory</p>
                            <div class="mt-3">
                                <span class="badge bg-danger">Secure Access</span>
                                <span class="badge bg-warning">Full Control</span>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        // Select Mode
        function selectMode(mode) {
            currentMode = mode;
            if (mode === 'customer') {
                window.location.href = '/customer.html';
            } else if (mode === 'admin') {
                showAdminLogin();
            }
        }

        // Show Admin Login
        function showAdminLogin() {
            document.getElementById('app').innerHTML = `
                <div class="row justify-content-center animate-fade">
                    <div class="col-md-6">
                        <button class="back-btn" onclick="showModeSelection()">
                            <i class="fas fa-arrow-left"></i> Back
                        </button>
                        <div class="login-container">
                            <div class="login-header">
                                <i class="fas fa-shield-alt"></i>
                                <h2>Admin Login</h2>
                                <p class="text-muted">Enter your credentials to access dashboard</p>
                            </div>
                            <form onsubmit="handleAdminLogin(event)">
                                <div class="mb-3">
                                    <label class="form-label fw-bold">Username</label>
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="fas fa-user"></i></span>
                                        <input type="text" id="username" class="form-control" placeholder="Enter username" required autocomplete="off">
                                    </div>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label fw-bold">Password</label>
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="fas fa-lock"></i></span>
                                        <input type="password" id="password" class="form-control" placeholder="Enter password" required>
                                    </div>
                                </div>
                                <div class="mb-3 form-check">
                                    <input type="checkbox" class="form-check-input" id="showPassword" onclick="togglePassword()">
                                    <label class="form-check-label" for="showPassword">Show Password</label>
                                </div>
                                <button type="submit" class="btn btn-custom text-white">
                                    <i class="fas fa-sign-in-alt"></i> Login
                                </button>
                            </form>
                            <div class="text-center mt-3">
                                <small class="text-muted">Demo Credentials: admin / admin123</small>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        // Toggle password visibility
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
            } else {
                passwordInput.type = 'password';
            }
        }

        // Handle Admin Login
        async function handleAdminLogin(event) {
            event.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            // Show loading
            const submitBtn = event.target.querySelector('button[type="submit"]');
            const originalText = submitBtn.innerHTML;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';
            submitBtn.disabled = true;
            
            // Simulate API call (in production, verify on backend)
            setTimeout(() => {
                if (username === ADMIN_CREDENTIALS.username && password === ADMIN_CREDENTIALS.password) {
                    // Login successful
                    showToast('Login successful! Redirecting...', 'success');
                    setTimeout(() => {
                        window.location.href = '/admin.html';
                    }, 1000);
                } else {
                    // Login failed
                    showToast('Invalid username or password!', 'danger');
                    submitBtn.innerHTML = originalText;
                    submitBtn.disabled = false;
                }
            }, 500);
        }

        // Show toast notification
        function showToast(message, type) {
            const toast = document.createElement('div');
            toast.className = `alert alert-${type} position-fixed top-0 end-0 m-3`;
            toast.style.zIndex = '9999';
            toast.style.minWidth = '250px';
            toast.style.animation = 'slideIn 0.3s';
            toast.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'} me-2"></i> ${message}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // Add animation style
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideIn {
                from { transform: translateX(100%); opacity: 0; }
                to { transform: translateX(0); opacity: 1; }
            }
        `;
        document.head.appendChild(style);

        // Initialize
        showModeSelection();
    </script>
</body>
</html>
