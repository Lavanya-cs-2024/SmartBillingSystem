<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Smart Billing</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            padding: 20px 25px;
            margin-bottom: 25px;
            transition: transform 0.3s;
        }

        .glass-card:hover {
            transform: translateY(-3px);
        }

        .stat-card {
            padding: 20px;
            border-radius: 15px;
            color: white;
            transition: all 0.3s;
            cursor: pointer;
            text-align: center;
        }

        .stat-card:hover {
            transform: scale(1.03);
        }

        .stat-card i {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .stat-card .stat-number {
            font-size: 1.8rem;
            font-weight: bold;
        }

        .stat-card .stat-label {
            font-size: 0.85rem;
            opacity: 0.9;
        }

        /* Chart Cards - Compact & Clean */
        .chart-card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
            transition: transform 0.2s, box-shadow 0.2s;
            height: 100%;
        }

        .chart-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
        }

        .chart-card-header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 12px 18px;
            font-weight: 600;
            font-size: 0.95rem;
        }

        .chart-card-header i {
            margin-right: 8px;
        }

        .chart-card-body {
            padding: 15px;
            text-align: center;
            background: white;
        }

        .chart-card-body canvas {
            max-height: 220px;
            width: 100% !important;
        }

        .chart-card-footer {
            background: #f8f9fa;
            padding: 10px 15px;
            border-top: 1px solid #e9ecef;
            text-align: center;
            font-size: 0.85rem;
            color: #495057;
        }

        .chart-card-footer i {
            margin-right: 6px;
            color: #667eea;
        }

        .chart-card-footer strong {
            color: #28a745;
            font-size: 1rem;
        }

        /* Status Badges */
        .status-paid {
            background: linear-gradient(135deg, #28a745, #20c997);
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: bold;
            display: inline-block;
        }

        .status-pending {
            background: linear-gradient(135deg, #ffc107, #fd7e14);
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: bold;
            display: inline-block;
        }

        .status-failed {
            background: linear-gradient(135deg, #dc3545, #e83e8c);
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: bold;
            display: inline-block;
        }

        .status-expired {
            background: linear-gradient(135deg, #6c757d, #495057);
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: bold;
            display: inline-block;
        }

        /* Navigation Tabs */
        .nav-tabs-custom {
            border: none;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            padding: 5px;
            margin-bottom: 25px;
        }

        .nav-tabs-custom .nav-link {
            border: none;
            border-radius: 10px;
            padding: 10px 20px;
            margin: 0 3px;
            color: white;
            font-weight: 600;
            transition: all 0.3s;
        }

        .nav-tabs-custom .nav-link:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .nav-tabs-custom .nav-link.active {
            background: white;
            color: #667eea;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
        }

        /* Tables */
        .table-custom {
            background: white;
            border-radius: 12px;
            overflow: hidden;
        }

        .table-custom thead {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .table-custom tbody tr:hover {
            background: #f8f9fa;
        }

        /* Filter Section */
        .filter-section {
            background: white;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.05);
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-fade {
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .stat-card .stat-number { font-size: 1.4rem; }
            .chart-card-body canvas { max-height: 180px; }
            .chart-card-header { padding: 10px 15px; font-size: 0.85rem; }
        }
    </style>
</head>
<body>
    <div id="authCheck" style="display: none;">
        <div class="container mt-5">
            <div class="alert alert-danger text-center">
                <i class="fas fa-lock fa-2x"></i>
                <h3>Access Denied</h3>
                <p>Please login from the main page to access admin dashboard.</p>
                <a href="/index.html" class="btn btn-primary">Go to Login</a>
            </div>
        </div>
    </div>
    
    <div id="adminContent" style="display: none;">
        <div class="container mt-3">
            <div class="glass-card animate-fade">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <h2 class="mb-0" style="background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
                            <i class="fas fa-chalkboard-user"></i> Admin Dashboard
                        </h2>
                        <small class="text-muted">Smart Billing System - Complete Control</small>
                    </div>
                    <button id="logoutBtn" class="btn btn-outline-danger btn-sm">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </button>
                </div>
            </div>

            <ul class="nav nav-tabs-custom" id="adminTabs">
                <li class="nav-item"><a class="nav-link active" data-tab="dashboard"><i class="fas fa-chart-line"></i> Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" data-tab="products"><i class="fas fa-box"></i> Products</a></li>
                <li class="nav-item"><a class="nav-link" data-tab="bills"><i class="fas fa-file-invoice-dollar"></i> Bills</a></li>
                <li class="nav-item"><a class="nav-link" data-tab="lowstock"><i class="fas fa-exclamation-triangle"></i> Low Stock</a></li>
            </ul>

            <div id="tabContent">
                <div class="text-center p-5">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                    <p class="mt-3">Loading dashboard...</p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/admin.js"></script>
    
    <script>
        // Authentication check
        const referrer = document.referrer;
        const isFromLogin = referrer.includes('index.html') || sessionStorage.getItem('adminLoggedIn') === 'true';
        
        if (!isFromLogin && window.location.pathname !== '/admin.html') {
            document.getElementById('authCheck').style.display = 'block';
        } else {
            sessionStorage.setItem('adminLoggedIn', 'true');
            document.getElementById('adminContent').style.display = 'block';
        }
        
        // Logout function
        document.getElementById('logoutBtn')?.addEventListener('click', function() {
            sessionStorage.removeItem('adminLoggedIn');
            window.location.href = '/index.html';
        });
    </script>
</body>
</html>
